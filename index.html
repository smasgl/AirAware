<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AirAware Vienna (Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  html, body { margin: 0; padding: 0; background: #fafafa; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes popIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.45; }
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%      { transform: scale(1.045); }
    28%      { transform: scale(1.0); }
    42%      { transform: scale(1.035); }
    70%      { transform: scale(1.0); }
  }
  @keyframes softPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.05); }
    50%      { transform: scale(1.008); }
  }

  button:focus { outline: none; }
  button:focus-visible { outline: 2px solid #7c3aed; outline-offset: 2px; }

  /* hide scrollbars in phone */
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* Leaflet attribution: tiny, bottom-right */
  .leaflet-control-attribution {
    background: rgba(255,255,255,0.7) !important;
    font-size: 9px !important;
    color: #71717a !important;
    padding: 1px 5px !important;
  }
  .leaflet-container { background: #e8e6df; outline: none; }
  .leaflet-tile { filter: saturate(0.9) contrast(0.95); }

  /* User marker */
  .aa-user-icon, .aa-dest-icon { background: transparent; border: none; }
  .aa-user { position: relative; width: 32px; height: 32px; }
  .aa-user-dot {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 14px; height: 14px; border-radius: 999px;
    background: #7c3aed; border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3), 0 0 0 1px rgba(124,58,237,0.4);
  }
  .aa-user-halo {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 18px; height: 18px; border-radius: 999px;
    background: rgba(124,58,237,0.18);
  }
  .aa-user-ring {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 32px; height: 32px; border-radius: 999px;
    background: radial-gradient(circle, rgba(124,58,237,0.5) 0%, rgba(124,58,237,0) 70%);
    opacity: 0;
  }
  .aa-user-pulse .aa-user-ring {
    animation: aaUserPulse 1.8s ease-out infinite;
  }
  @keyframes aaUserPulse {
    0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0.9; }
    100% { transform: translate(-50%, -50%) scale(2.2); opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="leaflet-map.jsx"></script>
<script type="text/babel" src="aa-constants.jsx"></script>
<script type="text/babel" src="aa-screens.jsx"></script>
<script type="text/babel" src="aa-app.jsx"></script>
</body>
</html>
